<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relationship Map — Documentary Template</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Helvetica Neue', Arial, sans-serif; color: #fff; }
  .node { cursor: pointer; }
  .node:hover { stroke-width: 3px !important; }
  .node-label { fill: #ccc; font-size: 11px; text-anchor: middle; pointer-events: none; }
  .link { stroke-opacity: 0.4; }
  .link:hover { stroke-opacity: 1; }
  .link-label { fill: #666; font-size: 9px; pointer-events: none; }
  #info-panel { position: fixed; top: 20px; right: 20px; width: 300px; background: rgba(20,20,20,0.95); border: 1px solid #333; border-radius: 8px; padding: 20px; display: none; }
  #info-panel h3 { margin: 0 0 8px 0; font-size: 16px; }
  .type-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-bottom: 8px; }
  #info-panel p { color: #999; font-size: 13px; line-height: 1.4; }
  #legend { position: fixed; bottom: 20px; left: 20px; background: rgba(20,20,20,0.95); border: 1px solid #333; border-radius: 8px; padding: 15px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px; color: #999; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<div id="info-panel">
  <h3 id="info-name"></h3>
  <span class="type-badge" id="info-type"></span>
  <p id="info-desc"></p>
  <div id="info-connections"></div>
</div>
<div id="legend"></div>
<svg id="graph"></svg>

<script>
// === SAMPLE DATA — Replace with your film's data ===
const data = {
  nodes: [
    {id: "subject", name: "Main Subject", type: "PROTAGONIST", description: "The central figure of the documentary."},
    {id: "alias-1", name: "Online Identity A", type: "PERSONA", description: "Digital persona used on forums."},
    {id: "alias-2", name: "Online Identity B", type: "PERSONA", description: "Social media account."},
    {id: "journalist", name: "Journalist", type: "JOURNALIST", description: "Reporter who investigated the story."},
    {id: "agent", name: "FBI Agent", type: "FBI", description: "Lead investigator on the case."},
    {id: "family-1", name: "Parent", type: "FAMILY", description: "Family member."},
    {id: "victim-1", name: "Target A", type: "VICTIM", description: "Person affected by online activity."},
    {id: "platform", name: "Social Platform", type: "INSTITUTION", description: "Platform where activity occurred."},
    {id: "filmmaker", name: "Director", type: "FILMMAKER", description: "Documentary filmmaker."}
  ],
  links: [
    {source: "subject", target: "alias-1", type: "CONTROLS", label: "created", weight: 5},
    {source: "subject", target: "alias-2", type: "CONTROLS", label: "operated", weight: 4},
    {source: "alias-1", target: "victim-1", type: "TARGETS", label: "targeted", weight: 3},
    {source: "journalist", target: "subject", type: "INVESTIGATES", label: "investigated", weight: 4},
    {source: "agent", target: "subject", type: "INVESTIGATES", label: "arrested", weight: 5},
    {source: "subject", target: "family-1", type: "FAMILY", label: "child", weight: 3},
    {source: "alias-1", target: "platform", type: "ONLINE_INTERACTION", label: "posted on", weight: 2},
    {source: "filmmaker", target: "subject", type: "PROFESSIONAL", label: "documenting", weight: 3}
  ]
};

const typeColors = {
  PROTAGONIST: "#e74c3c", PERSONA: "#9b59b6", FBI: "#2c3e50",
  FAMILY: "#27ae60", JOURNALIST: "#f39c12", VICTIM: "#e67e22",
  ANTAGONIST: "#c0392b", INSTITUTION: "#3498db", FILMMAKER: "#1abc9c"
};

const edgeStyles = {
  CONTROLS: {dash: "", color: "#9b59b6"},
  INVESTIGATES: {dash: "8,4", color: "#2c3e50"},
  TARGETS: {dash: "", color: "#e74c3c"},
  FAMILY: {dash: "", color: "#27ae60"},
  PROFESSIONAL: {dash: "4,4", color: "#3498db"},
  ONLINE_INTERACTION: {dash: "", color: "#555"},
  MANIPULATES: {dash: "", color: "#e74c3c"},
  COLLABORATES: {dash: "", color: "#3498db"}
};

const width = window.innerWidth, height = window.innerHeight;
const svg = d3.select("#graph").attr("width", width).attr("height", height);
const g = svg.append("g");

svg.call(d3.zoom().scaleExtent([0.2, 5]).on("zoom", e => g.attr("transform", e.transform)));
svg.on("click", () => { document.getElementById("info-panel").style.display = "none"; });

// Arrow markers
const defs = svg.append("defs");
["CONTROLS","TARGETS","INVESTIGATES","MANIPULATES"].forEach(type => {
  defs.append("marker").attr("id", `arrow-${type}`).attr("viewBox", "0 -5 10 10")
    .attr("refX", 20).attr("refY", 0).attr("markerWidth", 6).attr("markerHeight", 6)
    .attr("orient", "auto").append("path").attr("d", "M0,-5L10,0L0,5")
    .attr("fill", edgeStyles[type]?.color || "#555");
});

const simulation = d3.forceSimulation(data.nodes)
  .force("link", d3.forceLink(data.links).id(d => d.id).distance(d => 200 / (d.weight || 1)))
  .force("charge", d3.forceManyBody().strength(-400))
  .force("center", d3.forceCenter(width/2, height/2))
  .force("collide", d3.forceCollide(30))
  .force("radial", d3.forceRadial(d => {
    if (d.type === "PROTAGONIST") return 0;
    if (d.type === "PERSONA") return 150;
    if (d.type === "FAMILY") return 200;
    return 300;
  }, width/2, height/2).strength(0.3));

const link = g.selectAll(".link").data(data.links).join("line")
  .attr("class", "link")
  .attr("stroke", d => edgeStyles[d.type]?.color || "#555")
  .attr("stroke-width", d => (d.weight || 1) * 0.8)
  .attr("stroke-dasharray", d => edgeStyles[d.type]?.dash || "")
  .attr("marker-end", d => ["CONTROLS","TARGETS","INVESTIGATES","MANIPULATES"].includes(d.type) ? `url(#arrow-${d.type})` : "");

const linkLabel = g.selectAll(".link-label").data(data.links).join("text")
  .attr("class", "link-label").attr("text-anchor", "middle").text(d => d.label || "");

const node = g.selectAll(".node").data(data.nodes).join("circle")
  .attr("class", "node")
  .attr("r", d => d.type === "PROTAGONIST" ? 18 : 10)
  .attr("fill", d => typeColors[d.type] || "#888")
  .attr("stroke", "#fff").attr("stroke-width", 1.5)
  .call(d3.drag().on("start", dragStart).on("drag", dragging).on("end", dragEnd))
  .on("click", (event, d) => {
    event.stopPropagation();
    const panel = document.getElementById("info-panel");
    panel.style.display = "block";
    document.getElementById("info-name").textContent = d.name;
    const badge = document.getElementById("info-type");
    badge.textContent = d.type;
    badge.style.backgroundColor = typeColors[d.type] || "#888";
    document.getElementById("info-desc").textContent = d.description || "";
    const conn = document.getElementById("info-connections");
    while (conn.firstChild) conn.removeChild(conn.firstChild);
    data.links.filter(l => l.source.id === d.id || l.target.id === d.id).forEach(l => {
      const other = l.source.id === d.id ? l.target : l.source;
      const el = document.createElement("div");
      el.style.cssText = "color:#999;font-size:12px;margin:2px 0";
      el.textContent = `${l.label || l.type} → ${other.name}`;
      conn.appendChild(el);
    });
  });

const label = g.selectAll(".node-label").data(data.nodes).join("text")
  .attr("class", "node-label").attr("dy", d => d.type === "PROTAGONIST" ? -24 : -16)
  .text(d => d.name);

simulation.on("tick", () => {
  link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  linkLabel.attr("x", d => (d.source.x + d.target.x)/2).attr("y", d => (d.source.y + d.target.y)/2);
  node.attr("cx", d => d.x).attr("cy", d => d.y);
  label.attr("x", d => d.x).attr("y", d => d.y);
});

function dragStart(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragging(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

// Legend
const legend = document.getElementById("legend");
Object.entries(typeColors).forEach(([type, color]) => {
  const item = document.createElement("div");
  item.className = "legend-item";
  const dot = document.createElement("div");
  dot.className = "legend-dot";
  dot.style.backgroundColor = color;
  const text = document.createElement("span");
  text.textContent = type;
  item.appendChild(dot);
  item.appendChild(text);
  legend.appendChild(item);
});
</script>
</body>
</html>
